          - program discovery
      - name: Bureau of Labor Statistics Occupational Outlook Handbook
        url: https://www.bls.gov/ooh/
        source_type: labor_statistics
        use_for:
          - occupational outlook
          - labor market statistics
      - name: University official undergraduate catalog and department pages
        url: varies_by_university
        source_type: university_official
        use_for:
          - major requirements
          - concentrations
          - curriculum
          - admissions policies

  Australia:
    display_name_zh: 澳大利亚
    official_entry_points:
