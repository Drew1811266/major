metadata:
  purpose: 这个文件不是最终专业数据库，而是帮助 major 做归类、检索扩展和初步推荐的专业分类种子。
  usage:
    - 根据用户兴趣或背景快速定位可能相关的专业大类。
    - 为检索生成英文专业关键词。
    - 在用户信息不足时给出初步专业方向。
    - 后续必须结合国家术语、大学官网和课程目录继续核验。
  caution:
    - 同一 major 在不同国家、大学或院系下可能名称、课程结构和职业路径不同。
    - 不能仅凭本文件做最终推荐、排名或录取判断。

