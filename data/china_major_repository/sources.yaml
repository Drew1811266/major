source_usage_rules:
  ranking_reference:
    allowed_for:
      - 专业实力参考
      - 候选院校初筛
      - 第三方排名背景说明
    forbidden_for:
      - 当前招生结论
      - 录取要求
      - 专业组
      - 分省招生计划
      - 选科要求
      - 培养方案
      - 学费和截止日期
  official_sources_required_for:
    - currently_admitting
    - admissions_requirement
    - enrollment_plan
    - major_group
    - subject_selection_requirement
    - training_programme
    - tuition_fee
    - deadline
