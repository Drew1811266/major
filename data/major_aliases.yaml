description: >
  Multilingual alias seed for undergraduate major normalization and search
  expansion. This is not a complete database. Use it to expand user wording into
  likely official programme, department, course, 학과, 전공, 学部, 学科, 専攻, or コース
  search terms, then verify with current official sources.

usage_rules:
  - Do not assume aliases are exact equivalents across countries.
  - Use aliases to generate search terms and clarify ambiguity.
  - Preserve official programme titles in the source language when citing them.
  - When a user gives a broad label, show the likely subfields before recommending.

aliases:
  computer_science:
    zh:
      - 计算机科学
      - 计算机科学与技术
      - 软件工程
      - 信息与计算科学
    en:
      - Computer Science
      - Computing
      - Software Engineering
      - Computer Engineering
      - Informatics
