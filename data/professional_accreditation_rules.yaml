metadata:
  purpose: 为 major 提供专业认证、执照和资格路径核查规则。
  freshness_rule: "具体资格、认证、注册、临床、签证或执业路径必须优先使用当前/下一周期官方来源；2025-01-01 只是最低时效底线。"
  global_rules:
    - "不同国家和司法辖区资格路径不同。"
    - "本科专业不等于自动获得执业资格。"
    - "涉及临床、法律、医学、心理咨询、教师、建筑师、工程师、会计师、兽医、社工等方向时，必须提示用户查官方监管机构。"
    - "不得承诺职业资格、执业资格、签证、移民、就业或薪资结果。"

