answer_requirements:
  - "明确区分本科专业学习、认证课程、执业注册、签证/移民和就业。"
  - "受监管路径必须输出官方核查清单：机构、认证状态、临床/实习、考试/注册路径、适用年份。"
  - "把未核查路径标注为不确定。"
  - "不得承诺职业资格、执业资格、就业、薪资、签证或移民结果。"
